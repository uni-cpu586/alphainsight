name: Daily AlphaInsight Update (Cloud Ollama)

on:
  schedule:
    # 每天 UTC 時間 22:00 執行（等於台灣時間早上 06:00）
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊按鈕觸發執行

jobs:
  update-insights:
    runs-on: ubuntu-latest

    steps:
    - name: 複製專案程式碼 (Checkout)
      uses: actions/checkout@v4

    - name: 安裝 Ollama (Linux 版)
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: 啟動 Ollama 服務
      run: |
        ollama serve &
        # 等待 5 秒讓服務啟動
        sleep 5

    - name: 下載 Llama 3 模型到雲端
      run: |
        ollama pull llama3

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安裝 Python 依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: 執行 Python 爬蟲 (Crawler)
      run: python backend/crawler.py

    - name: 執行 AI 處理器 (使用雲端 Ollama Llama 3)
      run: python backend/agent_processor.py --mode ollama --model llama3

    - name: 將最新產生的 JSON 檔案提交並推送回 GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add frontend/data/processed_insights.json data/raw_data.json
        # 只有在檔案有變動時才進行 commit，避免錯誤
        git diff-index --quiet HEAD || git commit -m "Auto-update financial insights via Cloud Ollama: $(date +'%Y-%m-%d')"
        git push
