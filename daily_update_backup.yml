name: Daily AlphaInsight Update

on:
  schedule:
    # 每天 UTC 時間 00:30 執行（等於台灣時間早上 08:30）
    - cron: '30 0 * * *'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊按鈕觸發執行

jobs:
  update-insights:
    runs-on: ubuntu-latest

    steps:
    - name: 複製專案程式碼 (Checkout)
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安裝 Python 依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: 執行 Python 爬蟲 (Crawler)
      run: python backend/crawler.py

    - name: 執行 AI 處理器 (Gemini 雲端推論)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python backend/agent_processor.py --mode gemini

    - name: 將最新產生的 JSON 檔案提交並推送回 GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add frontend/data/processed_insights.json data/raw_data.json
        # 只有在檔案有變動時才進行 commit，避免錯誤
        git diff-index --quiet HEAD || git commit -m "Auto-update financial insights: $(date +'%Y-%m-%d')"
        git push
