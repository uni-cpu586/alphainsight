name: Daily AlphaInsight Update (Cloud Ollama)
on:
  schedule:
    # 每天 UTC 時間 00:30 執行（等於台灣時間早上 08:30）
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊按鈕觸發執行
jobs:
  update-insights:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: 複製專案程式碼 (Checkout)
      uses: actions/checkout@v4
    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: 安裝 Python 依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: 執行 Python 爬蟲 (Crawler)
      run: python backend/crawler.py
    - name: 檢查昨日是否休市 (Check Market Holiday)
      id: check_market
      run: |
        python -c '
        import json, datetime, os
        run_ollama = "true"
        if os.path.exists("data/raw_data.json"):
            with open("data/raw_data.json", "r", encoding="utf-8") as f:
                data = json.load(f)
            raw_date_str = data.get("stock_market_date", data.get("date"))
            try:
                raw_date = datetime.datetime.strptime(raw_date_str, "%Y-%m-%d").date()
                # 取得台灣時間昨日日期
                tz_offset = datetime.timezone(datetime.timedelta(hours=8))
                today_tw = datetime.datetime.now(tz_offset).date()
                yesterday_tw = today_tw - datetime.timedelta(days=1)
                
                # 如果最後交易日早於昨天，代表昨天是休市
                market_closed_yesterday = raw_date < yesterday_tw
                run_ollama = "false" if market_closed_yesterday else "true"
                print(f"raw_date: {raw_date}, yesterday_tw: {yesterday_tw}, market_closed: {market_closed_yesterday}, run_ollama: {run_ollama}")
            except Exception as e:
                print(f"Error parsing date: {e}")
        else:
            print("raw_data.json not found! Defaulting run_ollama=true")
            
        if "GITHUB_OUTPUT" in os.environ:
            with open(os.environ["GITHUB_OUTPUT"], "a") as f_out:
                f_out.write(f"run_ollama={run_ollama}\n")
        '
    - name: 安裝 Ollama (Linux 版)
      if: steps.check_market.outputs.run_ollama == 'true'
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
    - name: 啟動 Ollama 服務並執行 AI 處理器
      run: |
        if [ "${{ steps.check_market.outputs.run_ollama }}" = "true" ]; then
          echo "Starting Ollama..."
          ollama serve > ollama.log 2>&1 &
          
          echo "Waiting for Ollama to start..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready!"
              break
            fi
            sleep 1
          done
          
          echo "Pulling llama3.2 model..."
          ollama pull llama3.2
          
          echo "Running AI processor in hybrid mode..."
          python backend/agent_processor.py --mode hybrid --model llama3.2
        else
          echo "Running AI processor in gemini mode..."
          python backend/agent_processor.py --mode gemini
        fi
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    - name: 將最新產生的 JSON 檔案提交並推送回 GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add frontend/data/processed_insights.json data/raw_data.json frontend/data/audio/
        # 只有在檔案有變動時才進行 commit，避免錯誤並拉取最新變更重新對齊後推送
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update financial insights via Cloud Ollama: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
        fi
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: frontend
        branch: gh-pages
